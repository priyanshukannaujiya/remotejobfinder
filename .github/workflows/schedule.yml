name: Daily Job Scraper

on:
  schedule:
    # Run earlier to account for GitHub Actions queuing delays and 2-hour scraping time.
    # 02:17 UTC is 07:47 AM IST. Using an off-peak minute (17) reduces GitHub delays.
    - cron: '17 2 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Job Hunter
        env:
          EMAIL: ${{ secrets.EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python job_hunter/scheduler/main_job.py
          
      - name: Commit and push data updates
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add data/
          git commit -m "Automated data update: $(date)" || exit 0
          git push

      - name: Send Pipeline Failure Alert
        if: failure()
        env:
          EMAIL: ${{ secrets.EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: |
          python3 -c "
          import smtplib
          from email.mime.text import MIMEText
          import os
          
          try:
              msg = MIMEText('The RemoteJobFinder GitHub Action pipeline has encountered a critical failure. Please check the logs in your GitHub Actions tab to see what went wrong.')
              msg['Subject'] = '🚨 URGENT: Job Scraper Pipeline Failed!'
              msg['From'] = os.environ.get('EMAIL', '')
              msg['To'] = 'heypk4@gmail.com, kannaujiyapriyanshu111@gmail.com'
              
              if msg['From']:
                  s = smtplib.SMTP('smtp.gmail.com', 587)
                  s.starttls()
                  s.login(os.environ['EMAIL'], os.environ['APP_PASSWORD'])
                  s.send_message(msg)
                  s.quit()
                  print('Failure email sent successfully.')
          except Exception as e:
              print(f'Could not send failure email: {e}')
          "
